<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IFT | بضاعة الأمانة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --blue:#0B3866;--blue2:#134A86;--blue-lg:#E8EFF8;
  --green:#54A437;--green-d:#3F812A;--green-lg:#EAF4E6;
  --paper:#F1F5F9;--card:#fff;
  --ok:#2F7A4D;--ok-bg:#E6F2EA;
  --bad:#B23A33;--bad-bg:#FBE9E7;
  --warn:#C9952B;--warn-bg:#FBF1DD;
  --muted:#64748B;--line:#E2E8F0;
  --r:14px;--sh:0 2px 8px rgba(11,56,102,.08);--shl:0 8px 24px rgba(11,56,102,.14);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Cairo',sans-serif;background:var(--paper);color:var(--blue);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
input,select,textarea{font-family:inherit;outline:none;}
#app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--paper);position:relative;overflow-x:hidden;}

/* WELCOME */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--blue) 0%,#0a2f55 70%,#061d35 100%);color:#fff;padding:48px 28px;text-align:center;min-height:100vh;}
.wlogo{width:100px;height:100px;border-radius:24px;background:#fff;padding:8px;margin-bottom:24px;box-shadow:0 16px 40px rgba(0,0,0,.3);object-fit:contain;}
.welcome h1{font-size:26px;font-weight:900;margin-bottom:6px;}
.corp{font-size:10px;letter-spacing:3px;color:#8BB4D4;margin-bottom:12px;}
.welcome p{color:#A8C4DA;font-size:13px;line-height:2;max-width:300px;margin-bottom:28px;}
.stages{display:flex;gap:5px;margin-bottom:32px;flex-wrap:wrap;justify-content:center;}
.stages span{font-size:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);padding:4px 10px;border-radius:999px;color:#C5DCF0;}
.btn-primary{background:var(--green);color:#fff;padding:15px 0;width:100%;max-width:300px;border-radius:13px;font-weight:800;font-size:15px;transition:.15s;box-shadow:0 10px 24px rgba(84,164,55,.35);}
.btn-primary:active{transform:scale(.97);background:var(--green-d);}

/* SIGNIN */
.signin{flex:1;display:flex;flex-direction:column;justify-content:center;padding:36px 24px;min-height:100vh;}
.slogo{width:58px;height:58px;border-radius:16px;background:#fff;padding:6px;margin-bottom:16px;box-shadow:var(--shl);object-fit:contain;border:1px solid var(--line);}
.signin h2{font-size:22px;font-weight:800;margin-bottom:4px;}
.signin .sub{color:var(--muted);font-size:13px;margin-bottom:24px;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--blue2);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:14px;color:var(--blue);transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);}
.err{background:var(--bad-bg);color:var(--bad);font-size:13px;padding:10px 12px;border-radius:9px;margin-bottom:14px;font-weight:600;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* TOPBAR */
.topbar{background:var(--blue);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;box-shadow:0 2px 8px rgba(0,0,0,.22);}
.brand{display:flex;align-items:center;gap:10px;}
.tlogo{width:34px;height:34px;border-radius:9px;background:#fff;padding:3px;object-fit:contain;}
.tname{font-size:13px;font-weight:800;}
.trole{font-size:10px;color:#8BB4D4;}
.logout{background:rgba(255,255,255,.1);color:#fff;padding:7px 12px;border-radius:9px;font-size:12px;font-weight:700;}

/* TABBAR */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:640px;background:#fff;border-top:1px solid var(--line);display:flex;z-index:30;padding:5px 2px calc(5px + env(safe-area-inset-bottom));}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 1px;background:none;color:var(--muted);font-size:9.5px;font-weight:700;border-radius:10px;}
.tabbar .ic{font-size:17px;}
.tabbar button.active{color:var(--blue);}

.stitle{padding:16px 16px 2px;font-size:18px;font-weight:900;color:var(--blue);}
.ssub{padding:0 16px 10px;font-size:12px;color:var(--muted);}
.content{flex:1;padding:4px 14px 100px;overflow-y:auto;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:11px;box-shadow:var(--sh);}
.ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;}
.ctitle{font-weight:800;font-size:14px;}
.cmeta{font-size:11px;color:var(--muted);margin-top:2px;}
.tag{display:inline-block;font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px;}
.ta{background:var(--ok-bg);color:var(--ok);}
.tw{background:var(--warn-bg);color:var(--warn);}
.tt{background:var(--blue-lg);color:var(--blue2);}
.kv{display:flex;justify-content:space-between;font-size:12px;padding:2.5px 0;color:#3a4a60;}
.kv b{color:var(--blue);font-weight:700;}

/* TRACKER */
.tracker{display:flex;align-items:flex-start;margin:10px 0 4px;}
.seg{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--line);z-index:2;border:2px solid #fff;}
.seg.done .dot{background:var(--ok);}
.seg.now .dot{background:var(--green);box-shadow:0 0 0 4px rgba(84,164,55,.2);}
.seg.rej .dot{background:var(--bad);}
.seg::before{content:'';position:absolute;top:4px;right:50%;width:100%;height:2px;background:var(--line);z-index:1;}
.seg:first-child::before{display:none;}
.seg.done::before,.seg.now::before{background:var(--ok);}
.tlbl{font-size:8px;color:var(--muted);margin-top:5px;text-align:center;line-height:1.3;}
.seg.now .tlbl{color:var(--green);font-weight:800;}
.seg.rej .tlbl{color:var(--bad);font-weight:800;}

/* BUTTONS */
.brow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.bs{padding:10px 12px;border-radius:9px;font-size:12px;font-weight:800;flex:1;text-align:center;transition:.12s;border:none;}
.bok{background:var(--ok);color:#fff;}
.bbad{background:var(--bad);color:#fff;}
.bgo{background:var(--blue);color:#fff;}
.bgreen{background:var(--green);color:#fff;}
.bghost{background:#fff;color:var(--blue);border:1.5px solid var(--line) !important;}
.bs:active{opacity:.85;transform:scale(.97);}

/* MISC */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .ic{font-size:36px;margin-bottom:10px;}
.empty .t{font-weight:800;color:var(--blue);font-size:14px;margin-bottom:4px;}
.segtog{display:flex;background:#fff;border:1.5px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:16px;}
.segtog button{flex:1;padding:13px 0;font-weight:800;font-size:13px;background:#fff;color:var(--muted);}
.segtog button.on{background:var(--blue);color:#fff;}
.slabel{font-size:10.5px;font-weight:800;color:var(--blue2);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px;}
.lkname{font-size:11px;color:var(--ok);margin-top:3px;font-weight:700;min-height:13px;}
.lkname.miss{color:var(--bad);}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:700;z-index:99;box-shadow:0 8px 20px rgba(0,0,0,.25);white-space:nowrap;pointer-events:none;}
.balbox{background:var(--blue-lg);border:1.5px solid var(--blue2);border-radius:10px;padding:10px 12px;margin-bottom:13px;font-size:12.5px;line-height:1.8;}
.balok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);}
.balbad{background:var(--bad-bg);border-color:var(--bad);color:var(--bad);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.rbox{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:12px;cursor:pointer;}
.rbox .big{font-size:24px;font-weight:900;color:var(--blue);}
.rbox .lab{font-size:10px;color:var(--muted);font-weight:700;}
.pillbar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.pillbar::-webkit-scrollbar{display:none;}
.pillbar button{white-space:nowrap;padding:7px 13px;border-radius:999px;background:#fff;border:1.5px solid var(--line);font-size:11.5px;font-weight:700;color:var(--muted);}
.pillbar button.on{background:var(--blue);color:#fff;border-color:var(--blue);}
table.rep{width:100%;border-collapse:collapse;font-size:11px;}
table.rep th,table.rep td{padding:7px 5px;border-bottom:1px solid var(--line);text-align:right;}
table.rep th{color:var(--muted);font-weight:800;font-size:10px;background:var(--paper);}
.urow{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:7px;}
.sw{width:40px;height:23px;border-radius:999px;background:var(--line);position:relative;flex-shrink:0;cursor:pointer;}
.sw.on{background:var(--ok);}
.sw::after{content:'';position:absolute;top:3px;right:3px;width:17px;height:17px;border-radius:50%;background:#fff;transition:right .15s;}
.sw.on::after{right:20px;}
.attachbtn{display:flex;align-items:center;gap:8px;background:var(--blue-lg);border:1.5px dashed var(--blue2);border-radius:10px;padding:11px 14px;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--blue2);margin-bottom:13px;width:100%;}
.attachprev{background:var(--ok-bg);border:1px solid var(--ok);border-radius:10px;padding:9px 12px;margin-bottom:13px;font-size:12px;color:var(--ok);font-weight:700;}
.ew{color:var(--warn);font-weight:800;}
.eb{color:var(--bad);font-weight:800;}
.eo{color:var(--ok);}

/* ANIMATION */
.anim-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(6,29,53,.88);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.anim-road{width:260px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:18px 0;position:relative;}
.anim-road::after{content:'';position:absolute;top:50%;left:0;right:0;border-top:2px dashed rgba(255,255,255,.25);}
.anim-truck{font-size:42px;animation:drive 1.8s ease-in-out forwards;}
@keyframes drive{0%{transform:translateX(140px);opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{transform:translateX(-140px);opacity:0;}}
.anim-msg{color:#fff;font-size:16px;font-weight:800;margin-top:12px;}
.anim-corp{color:#8BB4D4;font-size:11px;letter-spacing:2px;margin-top:6px;}
.anim-bar{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:16px;overflow:hidden;}
.anim-bar::after{content:'';display:block;height:100%;background:var(--green);border-radius:2px;animation:prog 1.8s linear forwards;}
@keyframes prog{0%{width:0%;}100%{width:100%;}}

@media(min-width:640px){#app{box-shadow:0 0 40px rgba(11,56,102,.12);}}
@media print{.tabbar,.topbar,.brow,.pillbar,button,[data-a]{display:none!important;}body{background:#fff;}.content{padding:0;}.card{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid;}}
</style>
</head>

const SHARED=true;
async function dbGet(k,fb){try{const r=await window.storage.get(k,SHARED);return r?JSON.parse(r.value):fb;}catch(e){return fb;}}
async function dbSet(k,v){try{await window.storage.set(k,JSON.stringify(v),SHARED);}catch(e){}}
function uid(p){return p+'-'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

let DB={users:[],customers:[],items:[],orders:[],balances:{}};
async function loadDB(){
  DB.users=await dbGet('ift_users',null);
  if(!DB.users||!DB.users.length){DB.users=[{username:'admin',password:'admin123',name:'مدير النظام',role:'admin',active:true}];await dbSet('ift_users',DB.users);}
  DB.customers=await dbGet('ift_customers',[{code:'C001',name:'صيدلية النور'},{code:'C002',name:'مجمع الشفاء'}]);
  DB.items=await dbGet('ift_items',[{code:'I001',name:'أمبولات فيتامين ب12',unit:'علبة'},{code:'I002',name:'محلول ملحي 500مل',unit:'كيس'}]);
  DB.orders=await dbGet('ift_orders',[]);
  DB.balances=await dbGet('ift_balances',{});
}
async function svu(){await dbSet('ift_users',DB.users);}
async function svc(){await dbSet('ift_customers',DB.customers);}
async function svi(){await dbSet('ift_items',DB.items);}
async function svo(){await dbSet('ift_orders',DB.orders);await dbSet('ift_balances',DB.balances);}

function fc(code){return DB.customers.find(c=>c.code===code);}
function fi(code){return DB.items.find(i=>i.code===code);}
function bk(c,i){return c+'|'+i;}
function gb(c,i){return DB.balances[bk(c,i)]||0;}

const RLBL={admin:'مدير النظام',data_entry:'مدخل بيانات',accounts:'حسابات العملاء',cars:'السيارات',warehouse:'المخازن',rep:'مندوب توزيع'};
const SLBL={draft:'مسودة',pending_accounts:'بانتظار الحسابات',rejected:'مرفوض',pending_cars:'بانتظار السيارات',pending_warehouse:'بانتظار المخازن',pending_rep:'بانتظار المندوب',with_rep:'مع المندوب',delivered:'تم التسليم',approved:'تم الاستلام بالمخزن ✅'};
const ADD_STEPS=[{l:'إدخال'},{l:'حسابات'},{l:'مخازن'}];
const WD_STEPS=[{l:'إدخال'},{l:'حسابات'},{l:'سيارات'},{l:'مخازن'},{l:'مندوب'},{l:'تسليم'}];
function sidxAdd(o){return{draft:0,pending_accounts:1,rejected:1,pending_warehouse:2,approved:3}[o.stage]??0;}
function sidxWd(o){return{draft:0,pending_accounts:1,rejected:1,pending_cars:2,pending_warehouse:3,pending_rep:4,with_rep:4,delivered:5}[o.stage]??0;}

let S={screen:'welcome',tab:'home',user:null,oid:null,ntype:'addition',rng:'today',err:'',toast:'',hflt:null,bsrch:'',anim:null};
let pendAtt=null;

function toast(m){S.toast=m;render();setTimeout(()=>{S.toast='';render();},2400);}
function anim(msg,cb){S.anim=msg;render();setTimeout(()=>{S.anim=null;if(cb)cb();render();},2000);}

async function init(){await loadDB();S.screen='welcome';render();}
init();

function render(){
  const app=document.getElementById('app');
  let h='';
  if(S.screen==='welcome')h=rWel();
  else if(S.screen==='signin')h=rSI();
  else h=rShell();
  app.innerHTML=h;
  if(S.anim){
    const d=document.createElement('div');
    d.className='anim-overlay';
    d.innerHTML=`<div class="anim-truck">🚛</div><div class="anim-road"></div><div class="anim-msg">${S.anim}</div><div class="anim-corp">IFT CORPORATION</div><div class="anim-bar"></div>`;
    app.appendChild(d);
  }
  if(S.toast){const t=document.createElement('div');t.className='toast';t.textContent=S.toast;app.appendChild(t);}
  bind();
}

function rWel(){
  return `<div class="welcome">
    <img class="wlogo" src="${LOGO}" alt="IFT">
    <h1>بضاعة الأمانة</h1>
    <div class="corp">IFT CORPORATION</div>
    <p>نظام متكامل لتتبع بضاعة العملاء في المخزن من الإدخال حتى التسليم</p>
    <div class="stages"><span>إدخال</span><span>حسابات</span><span>سيارات</span><span>مخازن</span><span>مندوب</span><span>تسليم</span></div>
    <button class="btn-primary" data-a="go-si">دخول إلى النظام</button>
  </div>`;}

function rSI(){return `<div class="signin">
  <img class="slogo" src="${LOGO}" alt="IFT">
  <h2>تسجيل الدخول</h2>
  <div class="sub">IFT Corporation — نظام بضاعة الأمانة</div>
  ${S.err?`<div class="err">${S.err}</div>`:''}
  <form id="sif">
    <div class="field"><label>اسم المستخدم</label><input name="un" autocomplete="username" required></div>
    <div class="field"><label>كلمة المرور</label><input type="password" name="pw" autocomplete="current-password" required></div>
    <button class="btn-primary" type="submit" style="margin-top:8px;">دخول</button>
  </form>
</div>`;}

function getTabs(){
  const r=S.user.role,all=[{k:'home',ic:'🏠',t:'الرئيسية'}];
  if(r==='data_entry'||r==='admin')all.push({k:'new',ic:'➕',t:'جديد'},{k:'transfer',ic:'🔁',t:'تحويل'});
  if(['admin','data_entry','accounts'].includes(r))all.push({k:'bal',ic:'💳',t:'الأرصدة'});
  all.push({k:'rep',ic:'📊',t:'التقارير'});
  if(r==='admin')all.push({k:'adm',ic:'⚙️',t:'الإدارة'});
  return all;
}

function rShell(){
  const u=S.user;
  let body='';
  if(S.tab==='home')body=rHome();
  else if(S.tab==='new')body=rNew();
  else if(S.tab==='transfer')body=rTr();
  else if(S.tab==='bal')body=rBal();
  else if(S.tab==='rep')body=rRep();
  else if(S.tab==='adm')body=rAdm();
  else if(S.tab==='order')body=rOrd();
  return `
  <div class="topbar">
    <div class="brand"><img class="tlogo" src="${LOGO}" alt="IFT"><div><div class="tname">${u.name}</div><div class="trole">${RLBL[u.role]}</div></div></div>
    <button class="logout" data-a="logout">خروج</button>
  </div>
  ${body}
  <div class="tabbar">${getTabs().map(t=>`<button data-a="tab" data-tab="${t.k}" class="${(S.tab===t.k||(S.tab==='order'&&t.k==='home'))?'active':''}"><span class="ic">${t.ic}</span>${t.t}</button>`).join('')}</div>`;}

function forRole(u){
  switch(u.role){
    case 'data_entry':return DB.orders.filter(o=>o.cby===u.username);
    case 'accounts':return DB.orders.filter(o=>o.stage==='pending_accounts');
    case 'cars':return DB.orders.filter(o=>o.stage==='pending_cars');
    case 'warehouse':return DB.orders.filter(o=>o.stage==='pending_warehouse');
    case 'rep':return DB.orders.filter(o=>(o.stage==='pending_rep'||o.stage==='with_rep')&&o.repName===u.name);
    case 'admin':return DB.orders;
    default:return[];
  }
}

function otitle(o){
  if(o.kind==='transfer')return`تحويل ${o.iname||o.icode||''}`;
  return(o.kind==='addition'?'إضافة — ':'صرف — ')+(o.iname||o.icode||'');
}

function rCard(o){
  const tc=o.kind==='addition'?'ta':o.kind==='withdrawal'?'tw':'tt';
  const tt=o.kind==='addition'?'إضافة':o.kind==='withdrawal'?'صرف':'تحويل';
  const sc=o.stage==='rejected'?'var(--bad)':(o.stage==='delivered'||o.stage==='approved')?'var(--ok)':'var(--warn)';
  return `<div class="card" data-a="open" data-id="${o.id}">
    <div class="ch"><div><div class="ctitle">${otitle(o)}</div><div class="cmeta">${o.inv?'SO: '+o.inv+' · ':''}${o.cname||o.fcname||''}</div></div><span class="tag ${tc}">${tt}</span></div>
    <div class="kv"><span>الحالة</span><b style="color:${sc}">${SLBL[o.stage]}</b></div>
    <div class="kv"><span>الكمية</span><b>${o.qty||'-'}</b></div>
    <div class="kv"><span>بواسطة</span><b>${o.cbyn||o.cby||'-'}</b></div>
    ${rTrk(o)}</div>`;}

function rTrk(o){
  if(o.kind==='transfer'){
    const steps=[{l:'إدخال'},{l:'حسابات'},{l:'تنفيذ'}];
    const idx=o.stage==='approved'?3:o.stage==='rejected'?1:1;
    return`<div class="tracker">${steps.map((s,i)=>{let c=i<idx?'done':i===idx?'now':'';if(o.stage==='rejected'&&i===1)c='rej';return`<div class="seg ${c}"><div class="dot"></div><div class="tlbl">${s.l}</div></div>`;}).join('')}</div>`;
  }
  if(o.kind==='addition'){
    const idx=sidxAdd(o);
    return`<div class="tracker">${ADD_STEPS.map((s,i)=>{let c=i<idx?'done':i===idx?'now':'';if(o.stage==='rejected'&&i===1)c='rej';return`<div class="seg ${c}"><div class="dot"></div><div class="tlbl">${s.l}</div></div>`;}).join('')}</div>`;
  }
  const idx=sidxWd(o);
  return`<div class="tracker">${WD_STEPS.map((s,i)=>{let c=i<idx?'done':i===idx?'now':'';if(o.stage==='rejected'&&i===1)c='rej';return`<div class="seg ${c}"><div class="dot"></div><div class="tlbl">${s.l}</div></div>`;}).join('')}</div>`;}

function rHome(){
  const u=S.user;
  const cnt={pending_accounts:0,pending_cars:0,pending_warehouse:0,pending_rep:0};
  DB.orders.forEach(o=>{if(cnt[o.stage]!==undefined)cnt[o.stage]++;});
  let list=forRole(u).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  if(S.hflt)list=list.filter(o=>o.stage===S.hflt);
  const chips=[
    {s:'pending_accounts',l:'حسابات العملاء',ic:'🧾',roles:['admin','accounts']},
    {s:'pending_cars',l:'السيارات',ic:'🚗',roles:['admin','cars']},
    {s:'pending_warehouse',l:'المخازن',ic:'📦',roles:['admin','warehouse']},
    {s:'pending_rep',l:'المندوب',ic:'🧍',roles:['admin','rep']},
  ].filter(c=>c.roles.includes(u.role));
  return`
  <div class="stitle">${S.hflt?'مرشّح: '+SLBL[S.hflt]:'الرئيسية'}</div>
  <div class="ssub">${list.length} طلب${S.hflt?` · <span style="color:var(--green);cursor:pointer;" data-a="clf">إلغاء ✕</span>`:''}</div>
  <div class="content">
    ${chips.length?`<div class="grid${chips.length>2?'3':'2'}" style="margin-bottom:14px;">${chips.map(c=>`<div class="rbox" style="text-align:center;" data-a="flt" data-stage="${c.s}"><div style="font-size:20px;">${c.ic}</div><div class="big" style="color:${cnt[c.s]>0?'var(--green)':'var(--muted)'}">${cnt[c.s]}</div><div class="lab">${c.l}</div></div>`).join('')}</div>`:''}
    ${list.length===0?`<div class="empty"><div class="ic">📭</div><div class="t">لا توجد طلبات حالياً</div></div>`:list.map(rCard).join('')}
  </div>`;}

function rBal(){
  const q=(S.bsrch||'').trim();
  const u=S.user;
  // مدخل البيانات يرى فقط أرصدة العملاء التي أضافها هو
  let allowedKeys=null;
  if(u.role==='data_entry'){
    allowedKeys=new Set(
      DB.orders.filter(o=>o.kind==='addition'&&o.cby===u.username&&o.stage!=='rejected')
               .map(o=>bk(o.ccode,o.icode))
    );
  }
  let rows=Object.entries(DB.balances).filter(([,v])=>v!==0).map(([key,qty])=>{
    const[cc,ic]=key.split('|');const c=fc(cc);const it=fi(ic);
    return{cc,cn:c?c.name:'',ic,iname:it?it.name:'',unit:it?it.unit:'',qty,key};

  if(q)rows=rows.filter(r=>r.cc.includes(q)||r.cn.includes(q)||r.ic.includes(q)||r.iname.includes(q));

  return`

function inRng(o,r){
  const now=new Date(),d=new Date(o.createdAt||Date.now());
  if(r==='today')return d.toDateString()===now.toDateString();
  if(r==='week')return d>=new Date(now-7*864e5);
  if(r==='month')return d>=new Date(now-30*864e5);
  return true;
}

function rRep(){
  const rng=S.rng,list=DB.orders.filter(o=>inRng(o,rng));
  const adds=list.filter(o=>o.kind==='addition'),subs=list.filter(o=>o.kind==='withdrawal'),trs=list.filter(o=>o.kind==='transfer');

    </div>

      <div class="rbox" style="text-align:center;"><div class="big">${subs.length}</div><div class="lab">صرف (${qS})</div></div>

    <div class="kv"><span>المعمل</span><b>${o.labName||'-'}</b></div>`;

  if(o.rejectReason)flds+=`<div class="kv"><span>سبب الرفض</span><b style="color:var(--bad)">${o.rejectReason}</b></div>`;

      <div class="ch"><span class="tag ${tc}">${tt}</span><b style="color:${sc}">${SLBL[o.stage]}</b></div>
      ${rTrk(o)}

      ${att}${acts}

    <button class="bs bghost" style="width:100%;margin-top:4px;" data-a="back">⟵ رجوع</button>

    ${DB.customers.map(c=>`<div class="kv" style="background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 12px;margin-bottom:5px;"><span>${c.code}</span><b>${c.name}</b></div>`).join('')}
    <div class="slabel">إضافة صنف</div>
    <form id="aif"><div class="row2"><div class="field"><label>الكود</label><input name="code" required></div><div class="field"><label>الاسم</label><input name="name" required></div></div><div class="field"><label>الوحدة</label><input name="unit" placeholder="علبة / كيس / أمبول ..."></div><button class="btn-primary" type="submit">إضافة</button></form>
    <div class="slabel">الأصناف (${DB.items.length})</div>
    ${DB.items.map(i=>`<div class="kv" style="background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 12px;margin-bottom:5px;"><span>${i.code}</span><b>${i.name} ${i.unit?'('+i.unit+')':''}</b></div>`).join('')}
  </div>`;}

/* ===== BIND ===== */
function bind(){
  document.querySelectorAll('[data-a]').forEach(el=>el.addEventListener('click',onA));
  const f=(id,fn)=>{const e=document.getElementById(id);if(e)e.addEventListener('submit',fn);};
  f('sif',onSI);f('nf',onNew);f('trf',onTrf);f('carf',onCars);f('auf',onAU);f('acf',onAC);f('aif',onAI);
  lk('acc','acn','aclk','c');lk('aic','ain','ailk','i');lk('scc','scn','sclk','c');lk('sic','sin','silk','i');
  lk('tfc','tfn','tflk','c');lk('ttc','ttn','ttlk','c');lk('tic','tin','tilk','i');
  bbl();bsi();
  const af=document.getElementById('atf');if(af)af.addEventListener('change',onAtt);
}

function lk(cid,nid,lid,type){
  const ce=document.getElementById(cid);if(!ce)return;
  ce.addEventListener('input',()=>{
    const v=ce.value.trim(),ne=document.getElementById(nid),le=document.getElementById(lid);
    const found=type==='c'?fc(v):fi(v);
    if(found){ne.value=found.name;le.textContent='✓ '+found.name;le.classList.remove('miss');}
    else{ne.value='';le.textContent=v?'✗ غير موجود':'';le.classList.toggle('miss',!!v);}
  });
}

function bbl(){
  const box=document.getElementById('balbx');if(!box)return;
  const u=S.user;
  const upd=()=>{
    const cc=(document.getElementById('scc')||{}).value?.trim();
    const ic=(document.getElementById('sic')||{}).value?.trim();
    const qty=+(document.getElementById('sqty')||{}).value||0;
    if(!cc||!ic){box.textContent='أدخل كود العميل والصنف لعرض الرصيد المتاح حالياً';box.className='balbox';return;}
    // تحقق من الصلاحية لمدخل البيانات
    if(u.role==='data_entry'){
      const hasAdded=DB.orders.some(o=>o.kind==='addition'&&o.cby===u.username&&o.ccode===cc&&o.icode===ic&&o.stage!=='rejected');
      if(!hasAdded){box.innerHTML='⛔ <b>غير مسموح</b> — لا يمكنك الصرف لعميل لم تسجّل له إضافة بنفسك';box.className='balbox balbad';return;}
    }
    const bal=gb(cc,ic);const after=qty>0?bal-qty:null;
    box.innerHTML=`الرصيد المتاح: <b>${bal}</b>${after!==null?` · بعد الصرف: <b style="color:${after<0?'var(--bad)':'var(--ok)'}">${after}</b>`:''}`;
    box.className='balbox '+(bal<=0?'balbad':after!==null&&after<0?'balbad':'balok');
  };
  ['scc','sic','sqty'].forEach(id=>{const e=document.getElementById(id);if(e)e.addEventListener('input',upd);});
  upd();
}

function bsi(){
  const el=document.getElementById('bsi');if(!el)return;
  el.addEventListener('input',()=>{S.bsrch=el.value;render();const e2=document.getElementById('bsi');if(e2){e2.focus();e2.selectionStart=e2.selectionEnd=e2.value.length;}});
}

async function onAtt(e){
  const file=e.target.files[0];if(!file)return;
  if(file.size>2*1024*1024){toast('الملف أكبر من 2MB');return;}
  const r=new FileReader();
  r.onload=ev=>{pendAtt={data:ev.target.result,name:file.name,type:file.type};const p=document.getElementById('atp');if(p)p.innerHTML=`<div class="attachprev">✅ ${file.name}</div>`;};
  r.readAsDataURL(file);
}

function onA(e){
  const el=e.currentTarget,a=el.dataset.a,id=el.dataset.id;
  if(a==='go-si'){S.screen='signin';S.err='';render();}
  else if(a==='logout'){S.user=null;S.screen='welcome';S.tab='home';S.hflt=null;render();}
  else if(a==='tab'){S.tab=el.dataset.tab;S.oid=null;S.hflt=null;pendAtt=null;render();}
  else if(a==='stype'){S.ntype=el.dataset.type;pendAtt=null;render();}
  else if(a==='flt'){if(S.user.role==='admin'){S.hflt=el.dataset.stage;render();}}
  else if(a==='clf'){S.hflt=null;render();}
  else if(a==='open'){S.oid=id;S.tab='order';render();}
  else if(a==='back'){S.tab='home';S.oid=null;render();}
  else if(a==='rrng'){S.rng=el.dataset.rng;render();}
  else if(a==='fwd'){doFwd(id);}
  else if(a==='appr'){doAppr(id);}
  else if(a==='rej'){doRej(id);}
  else if(a==='whf'){doWH(id);}
  else if(a==='rrcv'){doRRcv(id);}
  else if(a==='rdlv'){doRDlv(id);}
  else if(a==='tog'){doTog(el.dataset.un);}
  else if(a==='xls'){doXLS();}
  else if(a==='pdf'){window.print();}
}

async function onSI(e){
  e.preventDefault();const f=new FormData(e.target);
  const un=f.get('un').trim(),pw=f.get('pw');
  if((!DB.users||!DB.users.length)&&un==='admin'&&pw==='admin123'){DB.users=[{username:'admin',password:'admin123',name:'مدير النظام',role:'admin',active:true}];await svu();}
  const u=DB.users.find(x=>x.username===un&&x.password===pw);
  if(!u){S.err='اسم المستخدم أو كلمة المرور غير صحيحة';render();return;}
  if(!u.active){S.err='هذا الحساب موقوف — راجع المدير';render();return;}
  S.user=u;S.err='';S.screen='app';S.tab='home';render();
}

async function onNew(e){
  e.preventDefault();const f=new FormData(e.target),u=S.user,kind=S.ntype;
  const cc=f.get('cc')?.trim(),ic=f.get('ic')?.trim(),qty=+f.get('qty');
  if(kind==='withdrawal'){
    // تحقق: مدخل البيانات لا يصرف لعميل لم يضفه هو
    if(u.role==='data_entry'){
      const hasAdded=DB.orders.some(o=>o.kind==='addition'&&o.cby===u.username&&o.ccode===cc&&o.icode===ic&&o.stage!=='rejected');
      if(!hasAdded){toast('⛔ لا يمكنك الصرف لعميل لم تسجّل له إضافة بنفسك');return;}
    }
    const bal=gb(cc,ic);
    if(bal<=0){toast('⛔ لا يوجد رصيد متاح لهذا العميل من هذا الصنف');return;}
    if(qty>bal){toast(`⛔ الكمية (${qty}) أكبر من الرصيد المتاح (${bal})`);return;}
  }
  const o={id:uid('o'),kind,stage:'pending_accounts',cby:u.username,cbyn:u.name,createdAt:Date.now(),updAt:Date.now(),
    inv:f.get('inv')||'',ccode:cc,cname:f.get('cn'),icode:ic,iname:f.get('iname'),
    batch:f.get('batch'),expiry:f.get('expiry'),qty,labName:f.get('labName')||'',note:f.get('note')||''};
  if(pendAtt)o.att=pendAtt;
  // *** الرصيد لا يُضاف هنا — يُضاف فقط عندما يؤكد المخزن استلام البضاعة ***
  DB.orders.push(o);await svo();pendAtt=null;
  anim('جارِ الإرسال إلى حسابات العملاء',()=>{S.tab='home';S.oid=null;});
}

async function onTrf(e){
  e.preventDefault();const f=new FormData(e.target),u=S.user;
  const o={id:uid('t'),kind:'transfer',stage:'pending_accounts',cby:u.username,cbyn:u.name,createdAt:Date.now(),updAt:Date.now(),
    fcc:f.get('fc'),fcname:f.get('fn'),tcc:f.get('tc'),tcname:f.get('tn'),
    icode:f.get('ic'),iname:f.get('iname'),qty:f.get('qty'),note:f.get('note')};
  DB.orders.push(o);await svo();toast('تم إرسال التحويل لحسابات العملاء');S.tab='home';render();
}

async function onCars(e){
  e.preventDefault();const f=new FormData(e.target),id=e.target.dataset.id;
  const o=DB.orders.find(x=>x.id===id);if(!o)return;
  o.repName=f.get('rn');o.carNo=f.get('cn');o.stage='pending_warehouse';o.updAt=Date.now();
  await svo();anim('جارِ الإرسال إلى المخازن',()=>{S.tab='home';S.oid=null;});
}

async function doFwd(id){
  const o=DB.orders.find(x=>x.id===id);if(!o)return;
  o.stage='pending_accounts';o.updAt=Date.now();await svo();
  anim('جارِ الإرسال إلى حسابات العملاء',()=>{S.tab='home';S.oid=null;});
}

async function doAppr(id){
  const o=DB.orders.find(x=>x.id===id);if(!o)return;
  if(o.kind==='transfer'){
    DB.balances[bk(o.fcc,o.icode)]=(DB.balances[bk(o.fcc,o.icode)]||0)-(+o.qty);
    DB.balances[bk(o.tcc,o.icode)]=(DB.balances[bk(o.tcc,o.icode)]||0)+(+o.qty);
    o.stage='approved';o.updAt=Date.now();await svo();
    toast('✅ تم تنفيذ التحويل وتحديث الأرصدة');S.tab='home';S.oid=null;render();return;
  }
  if(o.kind==='addition'){
    o.stage='pending_warehouse';
  }else{
    o.stage='pending_cars';
  }
  o.updAt=Date.now();await svo();
  anim(o.kind==='addition'?'تمت الموافقة — جارِ الإرسال للمخازن':'تمت الموافقة — جارِ الإرسال للسيارات',()=>{S.tab='home';S.oid=null;});
}

async function doRej(id){
  const o=DB.orders.find(x=>x.id===id);if(!o)return;
  const rsn=prompt('سبب الرفض:')||'بدون سبب';
  // لا نعدّل الرصيد لأنه لم يُضَف أصلاً قبل موافقة المخزن
  o.stage='rejected';o.rejectReason=rsn;o.updAt=Date.now();await svo();
  toast('تم رفض الطلب');S.tab='home';S.oid=null;render();
}

async function doWH(id){
  const o=DB.orders.find(x=>x.id===id);if(!o)return;
  if(o.kind==='addition'){
    // حماية من التكرار — الرصيد لا يُضاف إلا مرة واحدة
    if(o.balAdded){toast('⚠️ تم إضافة هذا الرصيد مسبقاً');return;}
    const k=bk(o.ccode,o.icode);
    DB.balances[k]=(DB.balances[k]||0)+(+o.qty);
    o.balAdded=true;
    o.stage='approved';o.updAt=Date.now();await svo();
    anim('✅ تم الاستلام بالمخزن وإضافة الرصيد للعميل',()=>{S.tab='home';S.oid=null;});
  }else{
    o.stage='pending_rep';o.updAt=Date.now();await svo();
    anim('جارِ الإرسال للمندوب',()=>{S.tab='home';S.oid=null;});
  }
}

async function doRRcv(id){
  const o=DB.orders.find(x=>x.id===id);if(!o)return;
  o.stage='with_rep';o.updAt=Date.now();await svo();toast('✅ تم تأكيد الاستلام');render();
}

async function doRDlv(id){
  const o=DB.orders.find(x=>x.id===id);if(!o)return;
  // حماية من التكرار — الخصم لا يتم إلا مرة واحدة
  if(o.balDeducted){toast('⚠️ تم خصم هذا الطلب مسبقاً');return;}
  const finish=async()=>{
    o.stage='delivered';o.updAt=Date.now();
    if(o.kind==='withdrawal'){
      const k=bk(o.ccode,o.icode);
      DB.balances[k]=(DB.balances[k]||0)-(+o.qty);
      o.balDeducted=true;
    }
    await svo();toast('✅ تم التسليم وتحديث الرصيد');S.tab='home';S.oid=null;render();
  };
  if(navigator.geolocation){navigator.geolocation.getCurrentPosition(async pos=>{o.dloc=`${pos.coords.latitude},${pos.coords.longitude}`;await finish();},async()=>await finish(),{timeout:5000});}
  else await finish();
}

async function doTog(un){
  const u=DB.users.find(x=>x.username===un);if(!u)return;
  if(u.username===S.user.username){toast('لا يمكنك إيقاف حسابك الخاص');return;}
  u.active=!u.active;await svu();render();
}

async function onAU(e){
  e.preventDefault();const f=new FormData(e.target);const un=f.get('un').trim();
  if(DB.users.some(u=>u.username===un)){toast('اسم المستخدم موجود مسبقًا');return;}
  DB.users.push({username:un,password:f.get('pw'),name:f.get('name'),role:f.get('role'),active:true});
  await svu();toast('تم إضافة المستخدم');e.target.reset();render();
}

async function onAC(e){
  e.preventDefault();const f=new FormData(e.target);const code=f.get('code').trim();
  if(DB.customers.some(c=>c.code===code)){toast('الكود مستخدم');return;}
  DB.customers.push({code,name:f.get('name')});await svc();toast('تم إضافة العميل');e.target.reset();render();
}

async function onAI(e){
  e.preventDefault();const f=new FormData(e.target);const code=f.get('code').trim();
  if(DB.items.some(i=>i.code===code)){toast('الكود مستخدم');return;}
  DB.items.push({code,name:f.get('name'),unit:f.get('unit')||''});await svi();toast('تم إضافة الصنف');e.target.reset();render();
}

function doXLS(){
  if(typeof XLSX==='undefined'){toast('جارِ تحميل مكتبة Excel...');return;}
  const wb=XLSX.utils.book_new();
  const hd=[['التاريخ','النوع','رقم الأمر','العميل','الصنف','الكمية','الحالة','المندوب','رقم العربية','بواسطة','ملحوظة']];
  DB.orders.forEach(o=>hd.push([
    new Date(o.createdAt||Date.now()).toLocaleDateString('ar-EG'),
    o.kind==='addition'?'إضافة':o.kind==='withdrawal'?'صرف':'تحويل',
    o.inv||'-',o.cname||o.fcname||o.ccode||'-',o.iname||o.icode||'-',o.qty||'-',
    SLBL[o.stage]||o.stage,o.repName||'-',o.carNo||'-',o.cbyn||o.cby||'-',o.note||''
  ]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(hd),'الحركات');
  const bd=[['كود العميل','اسم العميل','كود الصنف','اسم الصنف','الرصيد']];
  Object.entries(DB.balances).forEach(([k,qty])=>{
    const[cc,ic]=k.split('|');const c=fc(cc);const it=fi(ic);
    bd.push([cc,c?c.name:'',ic,it?it.name:'',qty]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(bd),'الأرصدة');
  XLSX.writeFile(wb,'IFT_Amana_'+new Date().toISOString().slice(0,10)+'.xlsx');
}
</script></body></html>
